  <title>dacape.dev</title>
  <meta name="description" content="Desarrollador mobile y creador de contenido. Apps, libros, gadgets y más.">
  <meta name="theme-color" content="#08080F">

    <nav class="nav">
      <a href="#home" class="nav-brand">dacape<span class="dot">.</span>dev</a>
      <div class="nav-links">
        <a href="#home"       class="nav-link" data-page="home">Inicio</a>
        <a href="#productos"  class="nav-link" data-page="productos">Productos</a>
        <a href="#descuentos" class="nav-link" data-page="descuentos">Descuentos</a>
      </div>
    </nav>
  </header>

  <main>
    <section id="home"       class="page"></section>
    <section id="productos"  class="page hidden"></section>
    <section id="descuentos" class="page hidden"></section>
  </main>

  <footer class="footer">
    © <span id="year"></span> dacape.dev
  </footer>

  let data = null;
  let activeCategory = null;

  async function init() {
    document.getElementById('year').textContent = new Date().getFullYear();
    try {
      const res = await fetch('data.json');
      data = await res.json();
      renderHome();
      renderProducts();
      renderDiscounts();
    } catch (e) {
      console.error('No se pudo cargar data.json', e);
    }
    handleNav();
    window.addEventListener('hashchange', handleNav);
  }

  function handleNav() {
    const hash = (window.location.hash || '#home').replace('#', '') || 'home';
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    const target = document.getElementById(hash);
    if (target) target.classList.remove('hidden');
    const link = document.querySelector(`.nav-link[data-page="${hash}"]`);
    if (link) link.classList.add('active');
  }

  /* ── HOME ────────────────────────────────────── */
  function renderHome() {
    const { profile, socials, featuredLinks } = data;
    const socialsHtml = socials
      .filter(s => s.url)
      .map(s => `
        <a href="${s.url}" target="_blank" rel="noopener noreferrer" class="social-link">
          <svg viewBox="0 0 24 24"><path d="${ICONS[s.id] || ''}"/></svg>
          ${s.label}
        </a>`).join('');

    const featuredHtml = featuredLinks.map(link => {
      const isExternal = link.url && !link.url.startsWith('#');
      return `
        <a href="${link.url || '#'}"
           ${isExternal ? 'target="_blank" rel="noopener noreferrer"' : ''}
           class="featured-card">
          <div class="featured-icon">${link.icon}</div>
          <div class="featured-info">
            <div class="featured-label">${link.label}</div>
            <div class="featured-desc">${link.description}</div>
          </div>
          <span class="featured-arrow">→</span>
        </a>`;
    }).join('');

    document.getElementById('home').innerHTML = `
      <div class="profile">
        <img src="${profile.photo}" alt="${profile.name}" class="profile-photo"
             onerror="this.style.display='none'">
        <h1 class="profile-name">${profile.name}</h1>
        <p class="profile-handle">@${profile.handle}</p>
        <p class="profile-bio">${profile.bio}</p>
      </div>
      ${socialsHtml ? `<div class="socials">${socialsHtml}</div>` : ''}
      <div class="featured-links">${featuredHtml}</div>`;
  }

  /* ── PRODUCTS ────────────────────────────────── */
  function renderProducts() {
    const { categories } = data.products;
    activeCategory = activeCategory || categories[0]?.id;

    const tabsHtml = categories.map(cat => `
      <button class="tab-btn ${cat.id === activeCategory ? 'active' : ''}"
              onclick="switchCategory('${cat.id}', this)">
        ${cat.icon} ${cat.name}
      </button>`).join('');

    document.getElementById('productos').innerHTML = `
      <div class="section-header">
        <p class="section-tag">// productos</p>
        <h2 class="section-title">Lo que recomiendo</h2>
      </div>
      <div class="category-tabs">${tabsHtml}</div>
      <div id="products-grid" class="products-grid">
        ${renderProductItems(categories.find(c => c.id === activeCategory)?.items || [])}
      </div>`;
  }

  function renderProductItems(items) {
    if (!items.length) return `
      <div class="empty-state">
        <div class="code">[ ]</div>
        Próximamente...
      </div>`;
    return items.map(item => `
      <a href="${item.url || '#'}" target="_blank" rel="noopener noreferrer" class="product-card">
        ${item.tag ? `<span class="product-tag">${item.tag}</span>` : ''}
        <div class="product-name">${item.name}</div>
        <div class="product-desc">${item.description}</div>
        <div class="product-cta">Ver producto →</div>
      </a>`).join('');
  }

  function switchCategory(id, btn) {
    activeCategory = id;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('products-grid').innerHTML =
      renderProductItems(data.products.categories.find(c => c.id === id)?.items || []);
  }

  /* ── DISCOUNTS ───────────────────────────────── */
  function renderDiscounts() {
    const { discounts } = data;
    const cardsHtml = discounts.length
      ? discounts.map(d => `
          <div class="discount-card">
            <div>
              <div class="discount-brand">${d.brand}</div>
              <div class="discount-desc">${d.description}</div>
              <div class="discount-meta">
                ${d.discount ? `<span class="discount-pct">${d.discount}</span>` : ''}
                ${d.url ? `<a href="${d.url}" target="_blank" rel="noopener noreferrer" class="store-link">Ir a la tienda →</a>` : ''}
              </div>
            </div>
            <div class="discount-code-block">
              <div class="discount-code">${d.code}</div>
              <button class="copy-btn" onclick="copyCode('${d.code}', this)">Copiar código</button>
            </div>
          </div>`).join('')
      : `<div class="empty-state"><div class="code">[ ]</div>Próximamente...</div>`;

    document.getElementById('descuentos').innerHTML = `
      <div class="section-header">
        <p class="section-tag">// descuentos</p>
        <h2 class="section-title">Códigos para mis seguidores</h2>
      </div>
      <div class="discounts-grid">${cardsHtml}</div>`;
  }

  function copyCode(code, btn) {
    navigator.clipboard.writeText(code).then(() => {
      btn.textContent = '✓ Copiado';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copiar código';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  init();
  </script>
</body>
